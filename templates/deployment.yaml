apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
  #namespace: roboshop
  labels: 
    project: roboshop
    tier: frontend
  annotations: 
    kubernetes.io/change-cause: {{ .Values.deployment.changeCause }}  
spec:
  replicas: {{ .Values.deployment.replicas }}
  selector:
    matchLabels:
      project: roboshop
      tier: frontend
  template:
    metadata:
      labels:
        project: roboshop
        tier: frontend
    spec:
      containers:
      - name: nginx
        image: nginx:{{ .Values.deployment.imageVersion }}
